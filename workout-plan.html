<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Conditioning Plan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif; background: #0e0e10; color: #e8e8e8; min-height: 100vh; padding-bottom: 40px; }
  .header { background: #141416; border-bottom: 1px solid #2a2a2e; padding: 52px 20px 16px; }
  .header-eyebrow { font-size: 11px; letter-spacing: 3px; color: #666; text-transform: uppercase; margin-bottom: 6px; }
  .header h1 { font-size: 24px; font-weight: 700; color: #f0f0f0; }
  .header-sub { font-size: 13px; color: #666; margin-top: 4px; }

  /* Streak Bar */
  .streak-bar { background: #141416; border-bottom: 1px solid #2a2a2e; padding: 14px 16px; display: flex; gap: 10px; }
  .streak-card { flex: 1; background: #1a1a22; border: 1px solid #2a2a35; border-radius: 12px; padding: 12px 14px; }
  .streak-card.highlight { border-color: #f7c94844; background: #1f1a0e; }
  .streak-num { font-size: 28px; font-weight: 800; line-height: 1; }
  .streak-num.fire { color: #f7c948; }
  .streak-num.blue { color: #4f8ef7; }
  .streak-num.green { color: #3ecf6e; }
  .streak-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
  .streak-sub { font-size: 11px; color: #555; margin-top: 2px; }

  /* Week grid */
  .week-grid { background: #141416; border-bottom: 1px solid #222; padding: 14px 16px; }
  .week-grid-label { font-size: 10px; letter-spacing: 2px; color: #555; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
  .week-dots { display: flex; gap: 5px; flex-wrap: wrap; }
  .week-dot { width: 20px; height: 20px; border-radius: 5px; border: 1px solid #2a2a35; background: #1a1a22; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #444; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .week-dot.completed { background: #4f8ef7; border-color: #4f8ef7; color: #000; }
  .week-dot.current { border-color: #4f8ef7; color: #4f8ef7; }
  .week-dot.partial { background: #1a2744; border-color: #4f8ef744; color: #4f8ef7; }

  .tabs { display: flex; overflow-x: auto; background: #141416; border-bottom: 1px solid #222; padding: 10px 12px; gap: 6px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent; background: transparent; color: #555; }
  .day-panel { display: none; padding: 18px 16px 80px; }
  .day-panel.active { display: block; }
  .day-header { border-radius: 14px; padding: 16px 18px; margin-bottom: 18px; }
  .day-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .day-type-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
  .day-title { font-size: 20px; font-weight: 700; color: #f0f0f0; }
  .day-focus { font-size: 13px; color: #aaa; margin-top: 2px; }
  .day-cardio { font-size: 12px; margin-top: 8px; font-weight: 500; }
  .progress-count { text-align: right; }
  .progress-count .num { font-size: 26px; font-weight: 800; }
  .progress-count .lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .progress-bar-track { background: #222; border-radius: 4px; height: 4px; margin-top: 12px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
  .exercise-list { display: flex; flex-direction: column; gap: 10px; }
  .exercise-card { background: #181820; border: 1px solid #2a2a35; border-radius: 12px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 14px; cursor: pointer; transition: opacity 0.15s; }
  .exercise-card.done { opacity: 0.45; background: #141414; }
  .checkbox { width: 24px; height: 24px; border-radius: 7px; border: 2px solid #444; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .checkbox.checked { border-color: transparent; }
  .check-mark { font-size: 13px; font-weight: 900; color: #000; display: none; }
  .checkbox.checked .check-mark { display: block; }
  .ex-name { font-weight: 600; font-size: 15px; color: #e8e8e8; line-height: 1.3; }
  .exercise-card.done .ex-name { color: #555; }
  .ex-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .ex-badge { font-size: 11px; padding: 3px 10px; border-radius: 6px; font-weight: 600; letter-spacing: 0.3px; }
  .ex-weight { font-size: 12px; color: #666; }
  .ex-tip { font-size: 12px; color: #666; margin-top: 6px; font-style: italic; line-height: 1.4; }

  /* Complete Day Button */
  .complete-day-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 18px; letter-spacing: 0.3px; transition: all 0.15s; }
  .complete-day-btn.ready { background: #4f8ef7; color: #fff; }
  .complete-day-btn.done-btn { background: #1a2744; color: #4f8ef7; border: 1px solid #4f8ef744; }
  .complete-day-btn.locked { background: #1a1a22; color: #444; border: 1px solid #222; cursor: default; }

  /* Toast */
  .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #1e1e28; border: 1px solid #3a3a4a; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 600; color: #e8e8e8; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }

  .rest-screen { text-align: center; padding: 60px 20px; }
  .rest-emoji { font-size: 56px; }
  .rest-title { font-size: 18px; font-weight: 600; color: #888; margin-top: 14px; }
  .rest-body { font-size: 13px; color: #555; margin-top: 8px; max-width: 240px; margin-left: auto; margin-right: auto; line-height: 1.6; }
  .tips-section { margin-top: 30px; }
  .section-label { font-size: 10px; letter-spacing: 2.5px; color: #555; text-transform: uppercase; margin-bottom: 14px; font-weight: 600; }
  .tip-card { background: #141416; border: 1px solid #222; border-radius: 12px; padding: 14px 16px; display: flex; gap: 13px; align-items: flex-start; margin-bottom: 10px; }
  .tip-icon { font-size: 22px; flex-shrink: 0; }
  .tip-title { font-weight: 600; font-size: 13px; color: #ddd; }
  .tip-body { font-size: 12px; color: #777; margin-top: 3px; line-height: 1.6; }

  /* Reset button */
  .reset-btn { background: transparent; border: 1px solid #2a2a2e; color: #555; font-size: 12px; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 20px; display: block; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">6-Day Program</div>

  <div class="header-sub">Lose 7–12 lbs · Build conditioning · 12 weeks</div>
</div>

<div class="streak-bar">
  <div class="streak-card highlight">

<div class="week-grid">

<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<div class="toast" id="toast"></div>

<script>
var plan = [

    ]

      { name: "DB Deadlift", sets: 3, reps: "10-12", weight: "20-25 lb", tip: "Drive through heels, squeeze glutes at top" },
      { name: "Renegade Row", sets: 3, reps: "6-8 each", weight: "10-15 lb", tip: "Plank position, row one arm at a time" },
      { name: "DB Lateral Raise", sets: 3, reps: "12", weight: "5-10 lb", tip: "Arms at T, slightly forward, no momentum" },
      { name: "DB Chest Press", sets: 3, reps: "10-12", weight: "15-25 lb", tip: "Full range, controlled" },
      { name: "Farmer's Carry", sets: 3, reps: "30-40 ft walk", weight: "20-25 lb each", tip: "Tall posture, core braced, slow steps" }
    ]
  },
  {

    cardio: null, exercises: []
  }
];

var tips = [
  { icon: "🥗", title: "Calorie deficit", body: "Aim for ~300-500 cal/day under maintenance. At 167 lb, ~2,200-2,400 cal/day is a good start." },
  { icon: "💧", title: "Hydration", body: "Drink at least 80-100 oz of water daily. More on workout days." },
  { icon: "😴", title: "Sleep", body: "7-8 hours is where fat loss and muscle retention happen. Non-negotiable." },
  { icon: "📈", title: "Progressive overload", body: "Once 12 reps feel easy, bump to the next dumbbell weight." },
  { icon: "⚖️", title: "Timeline", body: "At 1 lb/week, you could hit 155-160 in 7-12 weeks with consistency." }
];

var typeColors = {
  strength: { bg: "#1a2744", border: "#4f8ef722", accent: "#4f8ef7", badgeBg: "#0d1b36" },
  cardio:   { bg: "#0f2d1f", border: "#3ecf6e22", accent: "#3ecf6e", badgeBg: "#082015" },
  hiit:     { bg: "#2d1a0e", border: "#f7884f22", accent: "#f7884f", badgeBg: "#1e0f07" },
  rest:     { bg: "#1c1c1c", border: "#33333322", accent: "#888",    badgeBg: "#111" }
};

// ── Persistence helpers ──────────────────────────────────────────────────────
function saveState() {
  try {
    localStorage.setItem('cp_checked', JSON.stringify(checked));
    localStorage.setItem('cp_completed', JSON.stringify(completedDays));
    localStorage.setItem('cp_streak', JSON.stringify(streakData));
  } catch(e) {}
}

function loadState() {
  try {
    var c = localStorage.getItem('cp_checked');
    var d = localStorage.getItem('cp_completed');
    var s = localStorage.getItem('cp_streak');
    if (c) checked = JSON.parse(c);
    if (d) completedDays = JSON.parse(d);
    if (s) streakData = JSON.parse(s);
  } catch(e) {}
}

// ── State ────────────────────────────────────────────────────────────────────
// checked: { "dayIdx-exIdx": bool }  (per active workout day view)
// completedDays: [ "W1D0", "W1D1", ... ]  week/day keys
// streakData: { current, best, lastCompletedKey }

var checked = {};
var completedDays = [];   // array of "W{w}D{d}" strings
var streakData = { current: 0, best: 0, lastKey: null };
var activeDay = 0;

loadState();

// ── Streak helpers ───────────────────────────────────────────────────────────
function getCurrentWeek() {
  // week = floor(completedDays.length / 6) but capped at 11 (0-indexed)
  // A week is complete when 6 workout days (Mon-Sat) done
  var workoutDays = completedDays.filter(function(k) { return !k.match(/D6$/); });
  return Math.min(11, Math.floor(workoutDays.length / 6));
}

function getCompletedWeeksCount() {
  var counts = {};
  for (var i = 0; i < completedDays.length; i++) {
    var k = completedDays[i];
    var w = k.split('D')[0];
    if (!counts[w]) counts[w] = 0;
    counts[w]++;
  }
  var full = 0;
  for (var w in counts) { if (counts[w] >= 6) full++; }
  return full;
}

function makeKey(week, dayIdx) {
  return 'W' + week + 'D' + dayIdx;
}

function isDayCompleted(week, dayIdx) {
  return completedDays.indexOf(makeKey(week, dayIdx)) !== -1;
}

function getCurrentWorkoutWeek() {
  // Which week are we currently on (0-indexed)
  var workoutDone = completedDays.filter(function(k) { return !k.match(/D6$/); }).length;
  return Math.min(11, Math.floor(workoutDone / 6));
}

function getWeekDaysDone(week) {
  var count = 0;
  for (var d = 0; d < 6; d++) {
    if (isDayCompleted(week, d)) count++;
  }
  return count;
}

function completeDay(dayIdx) {
  var week = getCurrentWorkoutWeek();
  var key = makeKey(week, dayIdx);
  if (completedDays.indexOf(key) !== -1) return; // already done

  completedDays.push(key);

  // Update streak
  streakData.current++;
  if (streakData.current > streakData.best) streakData.best = streakData.current;
  streakData.lastKey = key;

  saveState();
  renderStreakBar();
  renderWeekGrid();
  renderAll();

  var weeksDone = getCompletedWeeksCount();
  if (getWeekDaysDone(week) === 6) {
    showToast('Week ' + (week + 1) + ' complete! 🎉');
  } else {
    showToast('Day logged! 🔥 Streak: ' + streakData.current);
  }
}

function uncompleteDay(dayIdx) {
  var week = getCurrentWorkoutWeek();
  var key = makeKey(week, dayIdx);
  var idx = completedDays.indexOf(key);
  if (idx === -1) return;
  completedDays.splice(idx, 1);
  if (streakData.current > 0) streakData.current--;
  saveState();
  renderStreakBar();
  renderWeekGrid();
  renderAll();
}

// ── Toast ────────────────────────────────────────────────────────────────────
var toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ── Streak bar render ────────────────────────────────────────────────────────
function renderStreakBar() {
  document.getElementById('streak-num').textContent = streakData.current;
  document.getElementById('streak-best').textContent = 'Best: ' + streakData.best;
  document.getElementById('weeks-num').textContent = getCompletedWeeksCount();
  var totalWorkoutDays = completedDays.filter(function(k) { return !k.match(/D6$/); }).length;
  document.getElementById('days-total-num').textContent = totalWorkoutDays;
}

// ── Week grid render ─────────────────────────────────────────────────────────
function renderWeekGrid() {
  var currentWeek = getCurrentWorkoutWeek();
  var html = '';
  for (var w = 0; w < 12; w++) {
    var done = getWeekDaysDone(w);
    var cls = 'week-dot';
    var label = 'W' + (w + 1);
    if (done === 6) {
      cls += ' completed';
    } else if (w === currentWeek && done > 0) {
      cls += ' partial';
    } else if (w === currentWeek) {
      cls += ' current';
    }
    html += '<div class="' + cls + '" title="Week ' + (w+1) + ': ' + done + '/6 days">' + (w+1) + '</div>';
  }
  document.getElementById('week-dots').innerHTML = html;
}

// ── Tabs & Panels ────────────────────────────────────────────────────────────
function getCheckedCount(dayIdx) {
  var count = 0;
  for (var i = 0; i < plan[dayIdx].exercises.length; i++) {
    if (checked[dayIdx + '-' + i]) count++;
  }
  return count;
}

function allExercisesDone(dayIdx) {
  var d = plan[dayIdx];
  if (d.exercises.length === 0) return false;
  for (var i = 0; i < d.exercises.length; i++) {
    if (!checked[dayIdx + '-' + i]) return false;
  }
  return true;
}

function renderAll() {
  renderTabs();
  renderPanels();
}

function renderTabs() {
  var html = '';
  for (var i = 0; i < plan.length; i++) {
    var d = plan[i];
    var c = typeColors[d.type];
    var isActive = i === activeDay;
    var style = isActive
      ? 'background:' + c.bg + ';color:' + c.accent + ';border:1px solid ' + c.accent + ';'
      : 'background:transparent;color:#555;border:1px solid transparent;';
    html += '<button class="tab" style="' + style + '" onclick="switchDay(' + i + ')">' + d.day + '</button>';
  }
  document.getElementById('tabs').innerHTML = html;
}

function renderPanels() {
  var html = '';
  var currentWeek = getCurrentWorkoutWeek();

  for (var dayIdx = 0; dayIdx < plan.length; dayIdx++) {
    var d = plan[dayIdx];
    var c = typeColors[d.type];
    var total = d.exercises.length;
    var done = getCheckedCount(dayIdx);
    var barPct = total > 0 ? Math.round((done / total) * 100) : 0;
    var isActive = dayIdx === activeDay;
    var dayCompleted = isDayCompleted(currentWeek, dayIdx);
    var innerHtml = '';

    var headerStyle = 'background:' + c.bg + ';border:1px solid ' + c.border + ';border-left:3px solid ' + c.accent + ';';

    if (d.type === 'rest') {
      innerHtml += '<div class="day-header" style="' + headerStyle + '">'
        + '<div class="day-type-label" style="color:' + c.accent + '">REST</div>'
        + '<div class="day-title">' + d.label + '</div>'
        + '<div class="day-focus">' + d.focus + '</div>'
        + '</div>';
      innerHtml += '<div class="rest-screen"><div class="rest-emoji">😮&zwj;💨</div>'
        + '<div class="rest-title">Recovery Day</div>'
        + '<div class="rest-body">Light walking, stretching, or full rest. Your muscles grow while you rest.</div></div>';
    } else {
      innerHtml += '<div class="day-header" style="' + headerStyle + '">'
        + '<div class="day-header-row">'
        + '<div>'
        + '<div class="day-type-label" style="color:' + c.accent + '">' + d.type.toUpperCase() + '</div>'
        + '<div class="day-title">' + d.label + '</div>'
        + '<div class="day-focus">' + d.focus + '</div>'
        + (d.cardio ? '<div class="day-cardio" style="color:' + c.accent + '">' + d.cardio + '</div>' : '')
        + '</div>'
        + '<div class="progress-count">'
        + '<div class="num" style="color:' + c.accent + '">' + done + '/' + total + '</div>'
        + '<div class="lbl">done</div>'
        + '</div>'
        + '</div>'
        + '<div class="progress-bar-track"><div class="progress-bar-fill" style="width:' + barPct + '%;background:' + c.accent + '"></div></div>'
        + '</div>';

      // Exercises
      innerHtml += '<div class="exercise-list">';
      for (var i = 0; i < d.exercises.length; i++) {
        var ex = d.exercises[i];
        var key = dayIdx + '-' + i;
        var isDone = !!checked[key];
        var cardStyle = isDone ? 'opacity:0.45;background:#141414;' : '';
        var cbStyle = isDone ? 'border-color:transparent;background:' + c.accent + ';' : '';
        innerHtml += '<div class="exercise-card' + (isDone ? ' done' : '') + '" style="' + cardStyle + '" onclick="toggleCheck(\'' + key + '\',' + dayIdx + ')">'
          + '<div class="checkbox' + (isDone ? ' checked' : '') + '" style="' + cbStyle + '">'
          + '<span class="check-mark">&#x2713;</span>'
          + '</div>'
          + '<div style="flex:1">'
          + '<div class="ex-name">' + ex.name + '</div>'
          + '<div class="ex-meta">'
          + '<span class="ex-badge" style="background:' + c.badgeBg + ';color:' + c.accent + '">' + ex.sets + ' x ' + ex.reps + '</span>'
          + '<span class="ex-weight">' + ex.weight + '</span>'
          + '</div>'
          + '<div class="ex-tip">💡 ' + ex.tip + '</div>'
          + '</div>'
          + '</div>';
      }
      innerHtml += '</div>';

      // Complete Day Button
      var allDone = allExercisesDone(dayIdx);
      var btnClass, btnText, btnOnclick;
      if (dayCompleted) {
        btnClass = 'complete-day-btn done-btn';
        btnText = '✓ Day ' + d.day + ' Logged — Tap to undo';
        btnOnclick = 'uncompleteDay(' + dayIdx + ')';
      } else if (allDone) {
        btnClass = 'complete-day-btn ready';
        btnText = 'Log ' + d.day + ' as Complete 🔥';
        btnOnclick = 'completeDay(' + dayIdx + ')';
      } else {
        btnClass = 'complete-day-btn locked';
        btnText = 'Complete all exercises to log this day';
        btnOnclick = '';
      }
      innerHtml += '<button class="' + btnClass + '"' + (btnOnclick ? ' onclick="' + btnOnclick + '"' : '') + '>' + btnText + '</button>';
    }

    // Tips
    innerHtml += '<div class="tips-section"><div class="section-label">Keys to Success</div>';
    for (var t = 0; t < tips.length; t++) {
      var tip = tips[t];
      innerHtml += '<div class="tip-card">'
        + '<div class="tip-icon">' + tip.icon + '</div>'
        + '<div><div class="tip-title">' + tip.title + '</div>'
        + '<div class="tip-body">' + tip.body + '</div></div>'
        + '</div>';
    }
    innerHtml += '</div>';

    // Reset
    if (dayIdx === 0) {
      innerHtml += '<button class="reset-btn" onclick="confirmReset()">Reset All Progress</button>';
    }

    html += '<div class="day-panel' + (isActive ? ' active' : '') + '" id="panel-' + dayIdx + '">' + innerHtml + '</div>';
  }
  document.getElementById('panels').innerHTML = html;
}

function switchDay(idx) {
  activeDay = idx;
  renderAll();
  window.scrollTo(0, 0);
}

function toggleCheck(key, dayIdx) {
  checked[key] = !checked[key];
  saveState();
  renderAll();
}

function confirmReset() {
  if (confirm('Reset all progress, streaks, and completed days?')) {
    checked = {};
    completedDays = [];
    streakData = { current: 0, best: 0, lastKey: null };
    saveState();
    renderStreakBar();
    renderWeekGrid();
    renderAll();
    showToast('Progress reset.');
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderStreakBar();
renderWeekGrid();
renderAll();
</script>
</body>
</html>
