function save() {

    localStorage.setItem("cp_c", JSON.stringify(checked));
    localStorage.setItem("cp_d", JSON.stringify(completedDays));

  } catch(e) {}
}

function checkedCount(di) {
  var n = 0;
  for (var i = 0; i < plan[di].exercises.length; i++) {
    if (checked[di + "," + i]) n++;
  }
  return n;
}
function allDone(di) {
  var d = plan[di];
  if (!d.exercises.length) return false;
  for (var i = 0; i < d.exercises.length; i++) {
    if (!checked[di + "," + i]) return false;
  }
  return true;
}
function wkey(w, di) { return "W" + w + "D" + di; }
function dayLogged(w, di) { return completedDays.indexOf(wkey(w, di)) !== -1; }
function curWeek() {
  var n = completedDays.filter(function(k){ return !/D6$/.test(k); }).length;
  return Math.min(11, Math.floor(n / 6));
}
function weeksDone() {
  var cnt = {};
  completedDays.forEach(function(k){ var w=k.split("D")[0]; cnt[w]=(cnt[w]||0)+1; });
  var f=0; for(var w in cnt){ if(cnt[w]>=6) f++; } return f;
}
function weekDaysDone(w) {
  var n=0; for(var d=0;d<6;d++){ if(dayLogged(w,d)) n++; } return n;
}
function logDay(di) {
  var w = curWeek(); var k = wkey(w,di);
  if (completedDays.indexOf(k) !== -1) return;
  completedDays.push(k);
  streakData.current++;
  if (streakData.current > streakData.best) streakData.best = streakData.current;
  save(); renderStreak(); renderGrid(); renderAll();
  showToast(weekDaysDone(w)===6 ? "Week "+(w+1)+" complete! &#x1F389;" : "Day logged! &#x1F525; Streak: "+streakData.current);
}
function unlogDay(di) {
  var w=curWeek(); var k=wkey(w,di);
  var idx=completedDays.indexOf(k); if(idx===-1) return;
  completedDays.splice(idx,1);
  if(streakData.current>0) streakData.current--;
  save(); renderStreak(); renderGrid(); renderAll();
}
var toastT=null;
function showToast(msg) {
  var el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  if(toastT) clearTimeout(toastT);
  toastT=setTimeout(function(){ el.classList.remove("show"); },2500);
}
function renderStreak() {
  document.getElementById("streak-num").textContent=streakData.current;
  document.getElementById("streak-best").textContent="Best: "+streakData.best;
  document.getElementById("weeks-num").textContent=weeksDone();
  var tot=completedDays.filter(function(k){ return !/D6$/.test(k); }).length;
  document.getElementById("days-total-num").textContent=tot;
}
function renderGrid() {
  var cw=curWeek(); var html="";
  for(var w=0;w<12;w++){
    var done=weekDaysDone(w);
    var cls="week-dot";
    if(done===6) cls+=" completed";
    else if(w===cw&&done>0) cls+=" partial";
    else if(w===cw) cls+=" current";
    html+="<div class='"+cls+"'>"+(w+1)+"</div>";
  }
  document.getElementById("week-dots").innerHTML=html;
}
function toggleCheck(key, di) {
  checked[key]=!checked[key]; save(); renderAll();
}
function renderTabs() {
  var html="";
  for(var i=0;i<plan.length;i++){
    var c=TC[plan[i].type]; var act=i===activeDay;
    var st=act ? "background:"+c.bg+";color:"+c.ac+";border:1px solid "+c.ac+";"
               : "background:transparent;color:#555;border:1px solid transparent;";
    html+="<button class='tab' style='"+st+"' onclick='switchDay("+i+")'>"+plan[i].day+"</button>";
  }
  document.getElementById("tabs").innerHTML=html;
}
function renderPanels() {
  var html=""; var cw=curWeek();
  for(var di=0;di<plan.length;di++){
    var d=plan[di]; var c=TC[d.type];
    var total=d.exercises.length;
    var done=checkedCount(di);
    var pct=total>0 ? Math.round(done/total*100) : 0;
    var logged=dayLogged(cw,di);
    var inner="";
    var hst="background:"+c.bg+";border:1px solid "+c.bdr+";border-left:3px solid "+c.ac+";";

    if(d.type==="rest"){
      inner+="<div class='day-header' style='"+hst+"'>"
        +"<div class='day-type-label' style='color:"+c.ac+"'>REST</div>"
        +"<div class='day-title'>"+d.label+"</div>"
        +"<div class='day-focus'>"+d.focus+"</div></div>"
        +"<div class='rest-screen'><div class='rest-emoji'>&#x1F4A4;</div>"
        +"<div class='rest-title'>Recovery Day</div>"
        +"<div class='rest-body'>Light walking, stretching, or full rest. Your muscles grow while you rest.</div></div>";
    } else {
      inner+="<div class='day-header' style='"+hst+"'>"
        +"<div class='day-header-row'><div>"
        +"<div class='day-type-label' style='color:"+c.ac+"'>"+d.type.toUpperCase()+"</div>"
        +"<div class='day-title'>"+d.label+"</div>"
        +"<div class='day-focus'>"+d.focus+"</div>"
        +(d.cardio ? "<div class='day-cardio' style='color:"+c.ac+"'>"+d.cardio+"</div>" : "")
        +"</div><div class='progress-count'>"
        +"<div class='num' style='color:"+c.ac+"'>"+done+"/"+total+"</div>"
        +"<div class='lbl'>done</div></div></div>"
        +"<div class='progress-bar-track'><div class='progress-bar-fill' style='width:"+pct+"%;background:"+c.ac+"'></div></div>"
        +"</div>";

      inner+="<div class='exercise-list'>";
      for(var i=0;i<d.exercises.length;i++){
        var ex=d.exercises[i];
        var ck=di+","+i;
        var isDone=!!checked[ck];
        var cst=isDone ? "opacity:0.45;background:#141414;" : "";
        var cbst=isDone ? "border-color:transparent;background:"+c.ac+";" : "";

        inner+="<div class='exercise-card"+(isDone?" done":"")+"' style='"+cst+"'>";
        inner+="<div class='exercise-card-top' onclick='toggleCheck(\""+ck+"\","+di+")'>"
          +"<div class='checkbox"+(isDone?" checked":"")+"' style='"+cbst+"'>"
          +"<span class='check-mark'>鉁?/span></div>"
          +"<div style='flex:1'>"
          +"<div class='ex-name'>"+ex.name+"</div>"
          +"<div class='ex-meta'>"
          +"<span class='ex-badge' style='background:"+c.bb+";color:"+c.ac+"'>"+ex.sets+" x "+ex.reps+"</span>"
          +"<span class='ex-weight'>"+ex.weight+"</span></div>"
          +"<div class='ex-tip'>&#x1F4A1; "+ex.tip+"</div>"
          +"</div></div>";

        if(ex.demo && DEMOS[ex.demo]){
          inner+="<a class='demo-link' href='"+DEMOS[ex.demo]+"' target='_blank' rel='noopener'>"
            +"<div class='demo-yt-icon'>"+YT_ICON+"</div>"
            +"<span class='demo-link-text'>Watch demo on YouTube</span>"
            +"<span class='demo-link-arrow'>鈫?/span>"
            +"</a>";
        }
        inner+="</div>";
      }
      inner+="</div>";

      var bcls,btxt,bonclick;
      if(logged){ bcls="done-btn"; btxt="鉁?Day "+d.day+" Logged 鈥?Tap to undo"; bonclick="unlogDay("+di+")"; }
      else if(allDone(di)){ bcls="ready"; btxt="Log "+d.day+" as Complete &#x1F525;"; bonclick="logDay("+di+")"; }
      else { bcls="locked"; btxt="Complete all exercises to log this day"; bonclick=""; }
      inner+="<button class='complete-day-btn "+bcls+"'"+(bonclick?" onclick='"+bonclick+"'":"")+" >"+btxt+"</button>";
    }

    inner+="<div class='tips-section'><div class='section-label'>Keys to Success</div>";
    for(var t=0;t<tips.length;t++){
      inner+="<div class='tip-card'><div class='tip-icon'>"+tips[t].icon+"</div>"
        +"<div><div class='tip-title'>"+tips[t].title+"</div>"
        +"<div class='tip-body'>"+tips[t].body+"</div></div></div>";
    }
    inner+="</div>";
    if(di===0) inner+="<button class='reset-btn' onclick='confirmReset()'>Reset All Progress</button>";

    html+="<div class='day-panel"+(di===activeDay?" active":"")+"' id='panel-"+di+"'>"+inner+"</div>";
  }
  document.getElementById("panels").innerHTML=html;
}
function renderAll(){ renderTabs(); renderPanels(); }
function switchDay(idx){ activeDay=idx; renderAll(); window.scrollTo(0,0); }
function confirmReset(){
  if(confirm("Reset all progress, streaks, and completed days?")){
    checked={}; completedDays=[]; streakData={current:0,best:0};
    save(); renderStreak(); renderGrid(); renderAll(); showToast("Progress reset.");
  }
}
renderStreak(); renderGrid(); renderAll();
</script>
</body>
</html>
